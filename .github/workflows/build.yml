name: Build

on:
  push:
    branches: [Fraze-glow-camera]
  pull_request:
    branches: [Fraze-glow-camera]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  #  ANDROID
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (${{ matrix.storage-type }})
    runs-on: ubuntu-latest
    permissions: write-all

    strategy:
      fail-fast: false
      matrix:
        storage-type: [EXTERNAL]

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Set Up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Haxe 4.3.7
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # ── Cache ─────────────────────────────────────────────────────────────────
      # Key includes hmm.json hash — dep changes auto-invalidate the cache.
      - name: Restore Build Cache
        id: cache-android-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            export/release/android/haxe/
            export/release/android/obj/
          key: cache-android-build-${{ hashFiles('hmm.json') }}
          restore-keys: cache-android-build-

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install --quiet
          haxelib set SScript 8.1.6

      # ── Android SDK / NDK Config ──────────────────────────────────────────────
      - name: Configure Android SDK / NDK
        run: |
          haxelib run lime config ANDROID_SDK      $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME        $JAVA_HOME
          haxelib run lime config ANDROID_SETUP    true

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Compile (arm64 release)
        run: haxelib run lime build android -D ${{ matrix.storage-type }} -arm64 -final
        env:
          cert_pass:           ${{ secrets.CERT_PASS }}
          cert_alias_pass:     ${{ secrets.CERT_ALIAS_PASS }}
          HXCPP_COMPILE_CACHE: ~/.hxcpp

      # ── Cache Save ────────────────────────────────────────────────────────────
      - name: Save Build Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            export/release/android/haxe/
            export/release/android/obj/
          key: cache-android-build-${{ hashFiles('hmm.json') }}

      # ── Artifact ──────────────────────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moon Extended (Android)
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  #  WINDOWS
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2019
    permissions: write-all

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Set Up Haxe 4.3.7
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # ── Cache ─────────────────────────────────────────────────────────────────
      - name: Restore Build Cache
        id: cache-windows-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/
          key: cache-windows-build-${{ hashFiles('hmm.json') }}
          restore-keys: cache-windows-build-

      # ── Dependencies ──────────────────────────────────────────────────────────
      # hxcpp: using official haxelib (mcagabe19-stuff fork is unavailable)
      # discord_rpc: handled via hmm.json as hxdiscord_rpc — no separate git install needed
      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install --quiet
          haxelib set SScript 8.1.6
        env:
          HXCPP_COMPILE_CACHE: ~/.hxcpp

      # ── Info ──────────────────────────────────────────────────────────────────
      - name: Print Toolchain Versions
        run: |
          haxe --version
          haxelib list

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Compile (x64 release)
        run: haxelib run lime build windows -64 -release
        env:
          HXCPP_COMPILE_CACHE: ~/.hxcpp

      # ── Cache Save ────────────────────────────────────────────────────────────
      - name: Save Build Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/
          key: cache-windows-build-${{ hashFiles('hmm.json') }}

      # ── Artifact ──────────────────────────────────────────────────────────────
      - name: Upload Build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moon Extended (Windows)
          path: export\release\windows\bin
          if-no-files-found: error
          retention-days: 30
