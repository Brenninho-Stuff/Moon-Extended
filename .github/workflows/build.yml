name: Build

on:
  push:
    branches: [Fraze-glow-camera]
  pull_request:
    branches: [Fraze-glow-camera]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  ANDROID
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (${{ matrix.storage-type }})
    runs-on: ubuntu-latest
    permissions: write-all

    strategy:
      fail-fast: false          # keep Windows running even if Android fails
      matrix:
        storage-type: [EXTERNAL]

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@main

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Set Up Java 17 (Temurin)
        uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Up Haxe 4.3.7
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      # ── Cache ─────────────────────────────────────────────────────────────────
      - name: Restore Build Cache
        id: cache-android-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export/release/android/haxe/
            export/release/android/obj/
          key: cache-android-build

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          haxelib run hmm install --quiet
          haxelib set SScript 8.1.6

      # ── Android SDK Config ────────────────────────────────────────────────────
      - name: Configure Android SDK / NDK
        run: |
          haxelib run lime config ANDROID_SDK  $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME    $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Compile (arm64 release)
        run: haxelib run lime build android -D ${{ matrix.storage-type }} -arm64 -final
        env:
          cert_pass:       ${{ secrets.CERT_PASS }}
          cert_alias_pass: ${{ secrets.CERT_ALIAS_PASS }}

      # ── Cache Maintenance ─────────────────────────────────────────────────────
      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: |
            try {
              const key = "cache-android-build";
              const list = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo:  context.repo.repo,
              });
              for (const cache of list.data.actions_caches ?? []) {
                if (cache.key === key) {
                  console.log(`Deleting cache: ${cache.key}`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner:    context.repo.owner,
                    repo:     context.repo.repo,
                    cache_id: cache.id,
                  });
                }
              }
            } catch (e) {
              console.error(e.message);
            }

      - name: Save Build Cache
        uses: actions/cache/save@main
        with:
          path: |
            export/release/android/haxe/
            export/release/android/obj/
          key: cache-android-build

      # ── Artifact ──────────────────────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: Moon Extended (Android)
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  #  WINDOWS
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2019
    permissions: write-all

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@main

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Set Up Haxe 4.3.7
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      # ── Cache ─────────────────────────────────────────────────────────────────
      - name: Restore Build Cache
        id: cache-windows-restore
        uses: actions/cache/restore@main
        with:
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/
          key: cache-windows-build

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/mcagabe19-stuff/hxcpp.git
          haxelib git discord_rpc https://github.com/Aidan63/linc_discord-rpc
          haxelib install hmm --quiet
          haxelib run hmm install > nul
          haxelib set SScript 8.1.6
        env:
          HXCPP_COMPILE_CACHE: ~/.hxcpp

      # ── Info ──────────────────────────────────────────────────────────────────
      - name: Print Toolchain Versions
        run: |
          haxe --version
          haxelib list

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Compile (x64 release)
        run: haxelib run lime build windows -64 -release

      # ── Cache Maintenance ─────────────────────────────────────────────────────
      - name: Clear Previous Cache
        uses: actions/github-script@main
        with:
          script: |
            try {
              const key = "cache-windows-build";
              const list = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo:  context.repo.repo,
              });
              for (const cache of list.data.actions_caches ?? []) {
                if (cache.key === key) {
                  console.log(`Deleting cache: ${cache.key}`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner:    context.repo.owner,
                    repo:     context.repo.repo,
                    cache_id: cache.id,
                  });
                }
              }
            } catch (e) {
              console.error(e.message);
            }

      - name: Save Build Cache
        uses: actions/cache/save@main
        with:
          path: |
            .haxelib/
            export/release/windows/haxe/
            export/release/windows/obj/
          key: cache-windows-build

      # ── Artifact ──────────────────────────────────────────────────────────────
      - name: Upload Build
        uses: actions/upload-artifact@main
        with:
          name: Moon Extended (Windows)
          path: export\release\windows\bin
          if-no-files-found: error
